name: Website

on:
  workflow_dispatch:
  push:
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  pull_request:

jobs:
  build:
    name: Website builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
